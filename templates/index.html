<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrientTrack - Dispatcher Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f8f9fa;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .map-container {
            width: 100%;
            height: 600px;
            background-color: #e9e9e9;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>OrientTrack Monitoring Panel</h1>
        <span style="background: #28a745; color: white; padding: 5px 10px; border-radius: 4px;">Live</span>
    </div>
    
    <div id="map" class="map-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // map centered roughly on Central Asia/Kazakhstan
        var map = L.map('map').setView([43.2389, 76.8897], 11);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // store active markers so we can update their positions
        var driverMarkers = {};

        function fetchDriverLocations() {
            fetch('/api/get_drivers')
                .then(response => response.json())
                .then(data => {
                    data.forEach(driver => {
                        // if marker exists, just move it
                        if (driverMarkers[driver.id]) {
                            driverMarkers[driver.id].setLatLng([driver.lat, driver.lng]);
                        } else {
                            // create new marker
                            var m = L.marker([driver.lat, driver.lng]).addTo(map);
                            m.bindPopup(`<b>${driver.name}</b><br>Status: ${driver.status}`);
                            driverMarkers[driver.id] = m;
                        }
                    });
                })
                .catch(err => console.error("Error fetching drivers:", err));
        }

        // fetch visual anchors
        function fetchAnchors() {
            fetch('/api/get_anchors')
                .then(response => response.json())
                .then(data => {
                    data.forEach(anchor => {
                        // using a circle for anchors to distinguish from drivers
                        L.circleMarker([anchor.lat, anchor.lng], {
                            color: 'red',
                            radius: 8
                        }).addTo(map).bindPopup(`<b>Anchor Point</b><br>${anchor.note}`);
                    });
                });
        }

        // load data immediately
        fetchDriverLocations();
        fetchAnchors();

        // poll for new driver locations every 5 seconds
        setInterval(fetchDriverLocations, 5000);
    </script>
</body>
</html>
